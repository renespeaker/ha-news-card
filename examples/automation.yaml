# Automation: refresh news sensors in the morning + push top 3 to your phone
# - adjust the entity_id list to your own News sensors (sensor.news_…)
# - adjust notify.mobile_app_your_phone to your device name
#   (Developer tools → Actions → search for "notify.mobile_app").

automation:
  - alias: "News Card: refresh news and push"
    description: >-
      Refreshes the news feeds at 06:00 and sends the top 3 headlines
      as a notification.
    triggers:
      - trigger: time
        at: "06:00:00"
    conditions: []
    actions:
      - action: homeassistant.update_entity
        target:
          entity_id:
            - sensor.news_tagesschau
            # - sensor.news_wdr        # add your own regional sensor
      - delay:
          seconds: 15
      - action: notify.mobile_app_your_phone
        data:
          title: "📰 News Card"
          message: >-
            {{ (state_attr('sensor.news_tagesschau', 'entries') or [])[:3]
               | map(attribute='title') | join('  •  ') }}
    mode: single
