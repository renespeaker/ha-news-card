# Fallback without the custom card: a plain Markdown "News Card"
# Works only with Feedparser sensors (see packages/news-card.yaml).
# Dashboard → Edit → Add card → Manual → paste this content.

type: markdown
content: >-
  ## 📰 News Card · {{ now().strftime('%A, %d.%m.%Y') }}

  **Germany**

  {% for e in (state_attr('sensor.news_tagesschau', 'entries') or [])[:5] %}
  - [{{ e.title }}]({{ e.link }})
  {% endfor %}

  ---

  **My region**

  {% for e in (state_attr('sensor.news_wdr', 'entries') or [])[:5] %}
  - [{{ e.title }}]({{ e.link }})
  {% endfor %}
