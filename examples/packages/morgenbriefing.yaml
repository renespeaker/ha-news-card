# Package "Morgenbriefing" – Standard-News-Sensoren
#
# Einbinden in configuration.yaml:
#   homeassistant:
#     packages: !include_dir_named packages
# …und diese Datei nach /config/packages/morgenbriefing.yaml kopieren.
#
# Voraussetzung: HACS-Integration "feedparser" (custom-components/feedparser).
#
# Namenskonvention: Sensoren heißen "MB <Name>" -> entity_id sensor.mb_<name>.
# Die Morgenbriefing-Karte findet Preset-Sensoren darüber automatisch
# (preset: tagesschau -> sensor.mb_tagesschau). Nicht benötigte Sensoren
# einfach auskommentiert lassen.

sensor:
  # ── Standard: national ────────────────────────────────────────────────
  - platform: feedparser
    name: MB Tagesschau
    feed_url: "https://www.tagesschau.de/index~rss2.xml"
    date_format: "%d.%m. %H:%M"
    local_time: true
    scan_interval:
      minutes: 30
    inclusions: [title, link, published]

