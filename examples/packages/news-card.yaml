# Package "News Card" – standard news sensors
#
# Include in configuration.yaml:
#   homeassistant:
#     packages: !include_dir_named packages
# …and copy this file to /config/packages/news-card.yaml.
#
# Requires the HACS integration "feedparser" (custom-components/feedparser).
#
# Naming: sensors are called "News <Name>" -> entity_id sensor.news_<name>.
# The News Card finds preset sensors via this convention automatically
# (preset: tagesschau -> sensor.news_tagesschau). Leave sensors you don't
# need commented out.

sensor:
  # ── Standard: national ────────────────────────────────────────────────
  - platform: feedparser
    name: News Tagesschau
    feed_url: "https://www.tagesschau.de/index~rss2.xml"
    date_format: "%d.%m. %H:%M"
    local_time: true
    scan_interval:
      minutes: 30
    inclusions: [title, link, published]

